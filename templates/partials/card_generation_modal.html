<!-- templates/partials/card_generation_modal.html -->
<div class="modal fade" id="cards-modal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="cardsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="cardsModalLabel">Generated Cards</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="cards-modal-body-content"></div>
                <div id="loading-spinner" class="text-center" style="display: none;">
                    <div class="spinner-border" role="status"><span class="visually-hidden">Loading...</span></div>
                    <p>Generating cards, please wait...</p>
                    <p id="loading-message" class="text-muted mt-2"></p>
                    <p id="loading-elapsed" class="text-muted small mb-2"></p>
                    <button type="button" id="cancel-generation-btn" class="btn btn-sm btn-outline-secondary">Cancel</button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="save-cards-btn">Save Approved Cards</button>
            </div>
        </div>
    </div>
</div>
<script>
// Card generation + approval logic. Lives with the modal markup so only the
// pages that include this partial ship it.
document.addEventListener('DOMContentLoaded', function () {
    const cardsModalEl = document.getElementById('cards-modal');
    const cardsModal = new bootstrap.Modal(cardsModalEl);
    const cardsModalBody = document.getElementById('cards-modal-body-content');
    const saveCardsBtn = document.getElementById('save-cards-btn');
    const loadingSpinner = document.getElementById('loading-spinner');
    const loadingMessage = document.getElementById('loading-message');
    const loadingElapsed = document.getElementById('loading-elapsed');
    const cancelGenerationBtn = document.getElementById('cancel-generation-btn');

    let generatedCardsData = [];
    let messageInterval;
    let elapsedInterval = null;
    let generateController = null;
    let lastRequest = null; // args of the latest generation, for retry-in-place
    const loadingMessages = [
        "Summoning digital flashcards...",
        "Teaching the AI to count in binary...",
        "Brewing coffee for the server hamsters...",
        "Reticulating splines...",
        "Asking the AI if it has any questions...",
        "Shuffling bits and bytes...",
        "Don't worry, the AI is a professional...",
        "Converting caffeine into code...",
        "Generating knowledge, one card at a time.",
        "The AI is thinking... or pretending to.",
        "Hold on, polishing the virtual cards."
    ];

    let generateInFlight = false;

    // This function is now globally available
    window.handleGenerateCards = function(apiUrl, contentProvider, csrfToken, cardType = 'basic') {
        if (generateInFlight) return;  // Ignore re-entrant clicks while a request is pending.

        // Cookie is more reliable than a hidden input on cached pages.
        const effectiveToken = window.getCsrfToken() || csrfToken;
        if (!effectiveToken) {
            window.toast('error', 'Missing security token — refresh the page and try again.');
            return;
        }

        const content = contentProvider();
        if (!content || !content.trim()) {
            window.toast('warning', 'Content is empty. Please add some text.');
            return;
        }

        lastRequest = { apiUrl, contentProvider, csrfToken, cardType };

        // Clear any stale intervals from a previous run before starting a new one.
        if (messageInterval) clearInterval(messageInterval);
        if (elapsedInterval) clearInterval(elapsedInterval);

        generatedCardsData = []; // Drop any previous batch before a new run.
        cardsModalBody.innerHTML = '';
        loadingSpinner.style.display = 'block';
        if(loadingMessage) loadingMessage.textContent = loadingMessages[0];
        saveCardsBtn.disabled = true;
        cardsModal.show();
        generateInFlight = true;

        // Start showing random messages
        let messageIndex = 0;
        messageInterval = setInterval(() => {
            messageIndex = (messageIndex + 1) % loadingMessages.length;
            if(loadingMessage) loadingMessage.textContent = loadingMessages[messageIndex];
        }, 2500);

        // Elapsed counter — LLM calls run 10-60s, and a ticking number says
        // more than a spinner about whether anything is still happening.
        const startedAt = Date.now();
        if (loadingElapsed) loadingElapsed.textContent = '0s';
        elapsedInterval = setInterval(() => {
            if (loadingElapsed) loadingElapsed.textContent = Math.round((Date.now() - startedAt) / 1000) + 's';
        }, 1000);

        // The Cancel button aborts this fetch through the module-level
        // handle; the closure-scoped controller keeps its aborted state
        // readable in catch/finally after the handle is cleared.
        const controller = new AbortController();
        generateController = controller;

        fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': effectiveToken },
            body: JSON.stringify({ content: content, card_type: cardType }),
            signal: controller.signal
        })
        .then(response => {
            if (response.redirected) {
                // A followed redirect means the session expired mid-generation.
                throw new Error('Your session has expired. Please log in again.');
            }
            if (!response.ok) {
                const contentType = response.headers.get('content-type') || '';
                if (contentType.includes('application/json')) {
                    return response.json().then(err => { throw new Error(err.detail || `HTTP error! status: ${response.status}`) });
                }
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            return response.json();
        })
        .then(data => {
            generatedCardsData = data.cards || [];
            if (generatedCardsData.length > 0) {
                displayGeneratedCards(generatedCardsData);
                saveCardsBtn.disabled = false;
            } else {
                cardsModalBody.innerHTML = '<p>No cards were generated. Try refining your course content.</p>';
            }
        })
        .catch(error => {
            if (controller.signal.aborted) return; // user cancelled — nothing to report
            showGenerationError(error);
            console.error('Error generating cards:', error);
        })
        .finally(() => {
            if (messageInterval) { clearInterval(messageInterval); messageInterval = null; }
            if (elapsedInterval) { clearInterval(elapsedInterval); elapsedInterval = null; }
            loadingSpinner.style.display = 'none';
            generateInFlight = false;
            generateController = null;
            if (controller.signal.aborted) {
                cardsModal.hide(); // empty batch, so the discard guard lets it close
                return;
            }
            // No-op when already visible; brings the result (or error) back if
            // the user closed the modal during the long generation call.
            cardsModal.show();
        });
    }

    // Error state with a retry button — regenerating shouldn't require
    // closing the modal and hunting down the original Generate button.
    function showGenerationError(error) {
        cardsModalBody.innerHTML = '';
        const message = document.createElement('p');
        message.className = 'text-danger';
        message.textContent = `Error: ${error.message}`;
        const retry = document.createElement('button');
        retry.type = 'button';
        retry.className = 'btn btn-outline-primary';
        retry.textContent = 'Try again';
        retry.addEventListener('click', function () {
            if (lastRequest) {
                window.handleGenerateCards(lastRequest.apiUrl, lastRequest.contentProvider, lastRequest.csrfToken, lastRequest.cardType);
            }
        });
        cardsModalBody.append(message, retry);
    }

    if (cancelGenerationBtn) {
        cancelGenerationBtn.addEventListener('click', function () {
            if (generateController) generateController.abort();
        });
    }

    function displayGeneratedCards(cards) {
        // Render from a clean container — no more template-string innerHTML with
        // untrusted content, which previously allowed `</textarea>` in an LLM
        // response to break out of the raw-text element and inject HTML.
        cardsModalBody.innerHTML = '';
        const container = document.createElement('div');
        container.id = 'generated-cards-container';

        cards.forEach((card, index) => {
            const isCloze = card.card_type === 'cloze';
            const questionRaw = card.question || '';
            const answerRaw = card.answer || '';
            const questionDisplay = window.safeMarkdownInline(
                isCloze ? window.formatClozeForDisplay(questionRaw) : questionRaw
            );
            const answerDisplay = window.safeMarkdownInline(answerRaw);

            const cardEl = document.createElement('div');
            cardEl.className = 'card mb-3';
            cardEl.dataset.cardIndex = String(index);
            cardEl.dataset.cardType = card.card_type || 'basic';

            const header = document.createElement('div');
            header.className = 'card-header d-flex flex-column flex-sm-row justify-content-sm-between align-items-start align-items-sm-center';
            const checkWrap = document.createElement('div');
            checkWrap.className = 'form-check';
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'form-check-input approve-checkbox';
            checkbox.id = `approve-${index}`;
            checkbox.checked = true;
            const checkLabel = document.createElement('label');
            checkLabel.className = 'form-check-label';
            checkLabel.htmlFor = checkbox.id;
            const strong = document.createElement('strong');
            strong.textContent = `Card ${index + 1}`;
            checkLabel.appendChild(strong);
            if (isCloze) {
                // cardTypeBadge returns a trusted static string.
                checkLabel.insertAdjacentHTML('beforeend', window.cardTypeBadge(true));
            }
            checkWrap.appendChild(checkbox);
            checkWrap.appendChild(checkLabel);
            const actions = document.createElement('div');
            actions.className = 'mt-2 mt-sm-0';
            actions.innerHTML = '<button class="btn btn-sm btn-outline-primary edit-card-btn">Edit</button> <button class="btn btn-sm btn-outline-danger delete-card-btn">Delete</button>';
            header.appendChild(checkWrap);
            header.appendChild(actions);

            const body = document.createElement('div');
            body.className = 'card-body';

            const viewWrap = document.createElement('div');
            viewWrap.className = 'card-content';
            const qP = document.createElement('p');
            qP.innerHTML = `<strong>${isCloze ? 'Text:' : 'Q:'}</strong> <span class="card-question">${questionDisplay}</span>`;
            const aP = document.createElement('p');
            aP.innerHTML = `<strong>${isCloze ? 'Answer:' : 'A:'}</strong> <span class="card-answer">${answerDisplay}</span>`;
            viewWrap.appendChild(qP);
            viewWrap.appendChild(aP);

            const editForm = document.createElement('div');
            editForm.className = 'edit-form';
            editForm.style.display = 'none';

            const qGroup = document.createElement('div');
            qGroup.className = 'mb-2';
            const qLabel = document.createElement('label');
            qLabel.className = 'form-label';
            qLabel.textContent = isCloze ? 'Text (use {{ "{{" }}c1::answer{{ "}}" }} for cloze):' : 'Question:';
            const qTextarea = document.createElement('textarea');
            qTextarea.className = 'form-control edit-question';
            qTextarea.value = questionRaw;  // Setting .value is XSS-safe.
            qGroup.appendChild(qLabel);
            qGroup.appendChild(qTextarea);

            const aGroup = document.createElement('div');
            aGroup.className = 'mb-2';
            const aLabel = document.createElement('label');
            aLabel.className = 'form-label';
            aLabel.textContent = 'Answer:';
            const aTextarea = document.createElement('textarea');
            aTextarea.className = 'form-control edit-answer';
            aTextarea.value = answerRaw;
            aGroup.appendChild(aLabel);
            aGroup.appendChild(aTextarea);

            editForm.appendChild(qGroup);
            editForm.appendChild(aGroup);
            editForm.insertAdjacentHTML('beforeend',
                '<button class="btn btn-sm btn-success save-edit-btn">Save</button> ' +
                '<button class="btn btn-sm btn-secondary cancel-edit-btn">Cancel</button>'
            );

            body.appendChild(viewWrap);
            body.appendChild(editForm);

            cardEl.appendChild(header);
            cardEl.appendChild(body);
            container.appendChild(cardEl);
        });

        cardsModalBody.appendChild(container);
        // window.MathJax is a plain config object until the async bundle loads.
        if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
            MathJax.typesetPromise([cardsModalBody]).catch(function (e) {
                console.warn('MathJax typesetting failed:', e);
            });
        }
    }

    cardsModalBody.addEventListener('click', function(e) {
        const target = e.target;
        const cardElement = target.closest('.card');
        if (!cardElement) return;

        const index = parseInt(cardElement.dataset.cardIndex, 10);
        const cardData = generatedCardsData[index];

        if (target.classList.contains('delete-card-btn')) {
            // Keep the array in sync with the DOM: index is still a stable key
            // because we never shift other entries; null marks "removed".
            generatedCardsData[index] = null;
            cardElement.remove();
        } else if (target.classList.contains('edit-card-btn')) {
            if (!cardData) { cardElement.remove(); return; }
            cardElement.querySelector('.edit-question').value = cardData.question;
            cardElement.querySelector('.edit-answer').value = cardData.answer;
            cardElement.querySelector('.card-content').style.display = 'none';
            cardElement.querySelector('.edit-form').style.display = 'block';
        } else if (target.classList.contains('cancel-edit-btn')) {
            cardElement.querySelector('.card-content').style.display = 'block';
            cardElement.querySelector('.edit-form').style.display = 'none';
        } else if (target.classList.contains('save-edit-btn')) {
            if (!cardData) { cardElement.remove(); return; }
            const newQuestion = cardElement.querySelector('.edit-question').value;
            const newAnswer = cardElement.querySelector('.edit-answer').value;

            cardData.question = newQuestion;
            cardData.answer = newAnswer;

            const questionSpan = cardElement.querySelector('.card-question');
            const answerSpan = cardElement.querySelector('.card-answer');
            questionSpan.innerHTML = window.safeMarkdownInline(newQuestion);
            answerSpan.innerHTML = window.safeMarkdownInline(newAnswer);

            if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
                MathJax.typesetPromise([questionSpan, answerSpan]).catch(function (e) {
                    console.warn('MathJax typesetting failed:', e);
                });
            }

            cardElement.querySelector('.card-content').style.display = 'block';
            cardElement.querySelector('.edit-form').style.display = 'none';
        }
    });

    let saveInFlight = false;
    saveCardsBtn.addEventListener('click', function() {
        if (saveInFlight) return;

        const approvedCards = [];
        const cardElements = cardsModalBody.querySelectorAll('.card');
        cardElements.forEach(cardElement => {
            const index = parseInt(cardElement.dataset.cardIndex, 10);
            const isApproved = cardElement.querySelector('.approve-checkbox').checked;
            if (isApproved && generatedCardsData[index]) {
                approvedCards.push(generatedCardsData[index]);
            }
        });

        if (approvedCards.length === 0) {
            window.toast('warning', 'No approved cards to save.');
            return;
        }

        const csrfToken = window.getCsrfToken() || document.getElementById('csrf-token')?.value;
        if (!csrfToken) {
            window.toast('error', 'Missing security token — refresh the page and try again.');
            return;
        }

        saveInFlight = true;
        saveCardsBtn.disabled = true;
        const originalLabel = saveCardsBtn.textContent;
        saveCardsBtn.textContent = 'Saving...';

        window.fetchJson('/api/save-cards', {
            method: 'POST',
            headers: { 'X-CSRF-Token': csrfToken },
            body: JSON.stringify({ cards: approvedCards })
        })
        .then(data => {
            generatedCardsData = []; // Saved — let the discard guard release the modal.
            window.toast('success', data.message || 'Cards saved');
            cardsModal.hide();
        })
        .catch(error => {
            window.toast('error', error.message || 'Could not save the cards.');
            console.error(error);
        })
        .finally(() => {
            saveInFlight = false;
            saveCardsBtn.disabled = false;
            saveCardsBtn.textContent = originalLabel;
        });
    });

    // With a static backdrop, only the Close buttons reach here — but they
    // used to drop an entire generated (and possibly hand-edited) batch with
    // zero warning. Confirm first while unsaved cards exist.
    cardsModalEl.addEventListener('hide.bs.modal', function (e) {
        if (!generatedCardsData.some(Boolean)) return;
        e.preventDefault();
        Swal.fire({
            title: 'Discard generated cards?',
            text: 'Cards you have not saved will be lost.',
            icon: 'warning',
            showCancelButton: true,
            customClass: window.swalClasses('btn btn-danger'),
            confirmButtonText: 'Yes, discard'
        }).then(result => {
            if (result.isConfirmed) {
                generatedCardsData = [];
                cardsModal.hide();
            }
        });
    });
});
</script>
